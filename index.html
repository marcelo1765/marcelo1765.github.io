<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio - Prueba</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .highlight {
            color: #ffd700;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 30px auto;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        .btn {
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Hola, soy <span class="highlight">Marcelo Ricardo Gil Grados Calderon</span> 👋</h1>
    <div class="card">
        <p>¡Mi portafolio está en construcción!</p>
        <p>Pronto más contenido...</p>
        <a href="#" class="btn">Ver proyectos</a>
    </div>
    <p>© 2024 - GitHub Pages funcionando ✅</p>
</body>
</html>
