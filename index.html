<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio | Marcelo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .highlight {
            color: #ffd700;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 30px auto;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }
        .btn {
            background: white;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: block;
            transition: transform 0.3s ease;
            margin: 10px auto;
            width: 80%;
            max-width: 250px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-linkedin {
            background: #0077b5;
            color: white;
        }
        .btn-cv {
            background: #28a745;
            color: white;
        }
        .btn-pdf {
            background: #dc3545;
            color: white;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>
    <h1>Hola, soy <span class="highlight">Marcelo Ricardo Gil Grados Calderon</span> 👋</h1>
    <div class="card">
        <p>¡Mi portafolio en GitHub Pages funciona! ✅</p>
        <p>Soy desarrollador Python y apasionado por la tecnología</p>
        
        <div class="buttons">
            <a href="mantenimiento.html" target="_blank" class="btn">Ver proyectos</a>
            <a href="https://www.linkedin.com/in/marcelo-gil-grados-calderon-895a46225/" target="_blank" class="btn btn-linkedin">
                🔗 Mi LinkedIn
            </a>
            <a href="marcelo.docx" download class="btn btn-cv">
                📄 Descargar CV.docx
            </a>
            <a href="marcelo.pdf" download class="btn btn-pdf">
                📑 Descargar CV.pdf
            </a>
        </div>
    </div>
    <p>© 2026 Marcelo - Portafolio en construcciónes</p>
</body>
</html>
